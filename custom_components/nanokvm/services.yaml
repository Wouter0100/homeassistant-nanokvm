push_button:
  name: Push Button
  description: Simulate pushing a hardware button on the NanoKVM device.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:
    button_type:
      name: Button Type
      description: The type of button to push (power or reset).
      required: true
      selector:
        select:
          options:
            - "power"
            - "reset"
    duration:
      name: Duration
      description: The duration to hold the button in milliseconds (100-5000).
      default: 100
      selector:
        number:
          min: 100
          max: 5000
          unit_of_measurement: ms

paste_text:
  name: Paste Text
  description: Paste text via HID keyboard simulation.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:
    text:
      name: Text
      description: The text to paste. Only ASCII printable characters are supported.
      required: true
      selector:
        text:
          multiline: true

reboot:
  name: Reboot System
  description: Reboot the NanoKVM device.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:

reset_hdmi:
  name: Reset HDMI
  description: Reset the HDMI connection (relevant for PCIe version).
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:

reset_hid:
  name: Reset HID
  description: Reset the HID subsystem.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:

wake_on_lan:
  name: Wake on LAN
  description: Send a Wake-on-LAN packet to the specified MAC address.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:
    mac:
      name: MAC Address
      description: The MAC address to send the Wake-on-LAN packet to.
      required: true
      example: "00:11:22:33:44:55"
      selector:
        text:

set_mouse_jiggler:
  name: Set Mouse Jiggler
  description: Configure the mouse jiggler state and mode.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:
    enabled:
      name: Enabled
      description: Enable or disable the mouse jiggler.
      required: true
      selector:
        boolean:
    mode:
      name: Mode
      description: The mouse jiggler mode (absolute or relative).
      default: "absolute"
      selector:
        select:
          options:
            - "absolute"
            - "relative"

set_led_strip:
  name: Set LED Strip
  description: Configure NanoKVM Pro LED strip settings.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
      selector:
        text:
    on:
      name: On
      description: Enable or disable the LED strip.
      selector:
        boolean:
    brightness:
      name: Brightness
      description: LED strip brightness percentage.
      selector:
        number:
          min: 0
          max: 100
          mode: slider
          unit_of_measurement: "%"
    horizontal_count:
      name: Horizontal Beads
      description: Horizontal LED bead count.
      selector:
        number:
          min: 1
          max: 148
          mode: box
    vertical_count:
      name: Vertical Beads
      description: Vertical LED bead count.
      selector:
        number:
          min: 1
          max: 74
          mode: box

scan_wifi:
  name: Scan Wi-Fi
  description: Scan nearby Wi-Fi networks and return the NanoKVM Pro response.
  fields:
    host:
      name: Host
      description: Optional target host. Required when multiple NanoKVM devices are configured.
